<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - HerbaLink</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

    <main class="auth-layout">

        <div class="auth-visual">
            <img src="../assets/Mobile login-pana (1).svg" alt="Login Illustration" class="illustration">
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <h2>Sign in</h2>
                <p class="subtitle">Log in to request or offer local assistance.</p>

                <form action="dashboard.html" method="POST" class="login-form">

                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" placeholder="e.g., name@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="your password" required>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot password?</a>
                    </div>

<button type="button" class="btn-submit" onclick="window.location.href='dashboard.html'">Sign In</button>                </form>

                <div class="divider">
                    <span>Or</span>
                </div>

                <div class="social-login">
                    <button class="btn-social" type="button">
                        <img src="../assets/google-icon.png" alt="G" width="18"> Google
                    </button>
                    <button class="btn-social" type="button">
                        <img src="../assets/apple-icon.png" alt="A" width="18"> Apple
                    </button>
                </div>

                <p class="signup-link">Don't have an account? <a href="register.html">Create Account</a></p>
            </div>
        </div>
    </main>

</body>
</html>
