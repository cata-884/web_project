<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CaT Camping</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <main class="auth-layout">

        <div class="auth-visual">
            <img src="../assets/Mobile login-pana (1).svg" alt="Login Illustration" class="illustration">
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <h2>Sign in</h2>
                <p class="subtitle">Conecteaza-te pentru a vedea rezervarile si favoritele tale.</p>

                <form id="login-form" class="login-form" novalidate>

                    <div class="form-group">
                        <label for="email">Email sau username</label>
                        <div class="input-wrapper">
                            <input type="text" id="email" name="email" placeholder="e.g., name@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Parola</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="parola ta" required>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Ai uitat parola?</a>
                    </div>

                    <div id="login-error"
                        style="display:none; color:#EF6A00; font-size:14px; margin-bottom:10px; padding:8px 12px; background:rgba(239,106,0,.08); border-radius:6px;">
                    </div>

                    <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
                </form>

                <div class="divider">
                    <span>Sau</span>
                </div>

                <div class="social-login">
                    <a href="/cat/public/api/auth/oauth/google" class="btn-social">
                        <span>G</span> Google
                    </a>
                </div>
                <p class="signup-link">Nu ai cont? <a href="register.html">Creeaza un cont</a></p>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script>
        (function () {
            // Preia tokenul din URL dupa OAuth callback (?token=...)
            const urlParams = new URLSearchParams(window.location.search);
            const oauthToken = urlParams.get('token');
            if (oauthToken) {
                localStorage.setItem('cat_token', oauthToken);
                window.history.replaceState({}, '', window.location.pathname);
                window.location.href = 'account/account.html';
                return;
            }

            const oauthError = urlParams.get('error');
            if (oauthError) {
                const errEl = document.getElementById('login-error');
                errEl.textContent = 'Eroare Google OAuth: ' + oauthError;
                errEl.style.display = 'block';
            }

            // Redirect daca e deja logat
            if (localStorage.getItem('cat_token')) {
                window.location.href = 'account/account.html';
            }

            document.getElementById('login-form').addEventListener('submit', async function (e) {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                const errEl = document.getElementById('login-error');
                const identifier = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                errEl.style.display = 'none';
                btn.disabled = true;
                btn.textContent = 'Se conecteaza...';

                try {
                    const body = { password };
                    if (identifier.includes('@')) {
                        body.email = identifier;
                    } else {
                        body.username = identifier;
                    }
                    const data = await api.post('/api/auth/login', body);
                    localStorage.setItem('cat_token', data.token);
                    localStorage.setItem('cat_user', JSON.stringify(data.user));
                    window.location.href = 'account/account.html';
                } catch (err) {
                    errEl.textContent = err.message || 'Eroare la autentificare. Incearca din nou.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });
        })();
    </script>
</body>

</html>
