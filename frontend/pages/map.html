<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Campinguri - CaT</title>
    <meta name="description" content="Exploreaza campingurile din Romania pe harta interactiva. Filtreaza dupa tip, pret si rating.">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">

    <link rel="stylesheet" href="../css/map.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>
<body data-page-title="map.title">
    <div class="map-page">

        <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Comuta bara laterala"></button>

        <div class="map-overlay" id="map-overlay"></div>

        <aside class="map-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-top">
                    <div class="logo">CaT</div>
                    <span class="lang-toggle-container"></span>
                </div>
                <nav class="sidebar-nav">
                    <a href="../index.html" data-i18n="nav.home">Acasa</a>
                    <a href="campings.html" data-i18n="nav.explore">Exploreaza</a>
                    <a href="map.html" class="active-link" data-i18n="nav.map">Harta</a>
                    <a href="account/account.html" data-i18n="map.nav_account">Cont</a>
                </nav>
            </div>

            <div class="sidebar-content">
<h1 class="sr-only" data-i18n="map.title">Harta campinguri</h1>                <div class="map-filters">
                    <h2 data-i18n="map.filters">Filtre</h2>

                    <div class="filter-section">
                        <h3 data-i18n="map.type_label">Tip camping</h3>
                        <div class="type-checkboxes">
                            <label>
                                <input type="checkbox" value="tent">
                                <span data-i18n="map.type_tent">Cort</span>
                            </label>
                            <label>
                                <input type="checkbox" value="wild">
                                <span data-i18n="map.type_wild">Salbatic</span>
                            </label>
                            <label>
                                <input type="checkbox" value="rv">
                                <span data-i18n="map.type_rv">Autorulota</span>
                            </label>
                            <label>
                                <input type="checkbox" value="cabin">
                                <span data-i18n="map.type_cabin">Casuta</span>
                            </label>
                            <label>
                                <input type="checkbox" value="glamping">
                                <span data-i18n="map.type_glamping">Glamping</span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3 data-i18n="map.price_label">Pret maxim / noapte</h3>
                        <div class="price-slider-group">
                            <label for="price-slider"></label><input type="range" id="price-slider" min="0" max="1000" value="1000" step="10">
                            <div class="price-display" id="price-display">0 — 1000 RON</div>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3 data-i18n="map.rating_label">Rating minim</h3>
                        <label for="rating-filter"></label><select class="rating-select" id="rating-filter">
                            <option value="" data-i18n="map.rating_any">Oricare</option>
                            <option value="2">2+ </option>
                            <option value="3">3+ </option>
                            <option value="4">4+ </option>
                            <option value="4.5">4.5+ </option>
                        </select>
                    </div>
                </div>

                <div class="results-header">
                    <h2 data-i18n="map.results_title">Locatii in aceasta zona</h2>
                    <span class="count-badge" id="visible-count">0</span>
                </div>

                <ul class="results-list" id="results-list">
                    <li class="results-loading"></li>
                </ul>
            </div>
        </aside>

        <div class="map-container">
            <div id="map"></div>
            <button type="button" class="locate-btn" id="locate-me" data-i18n-title="map.locate_me" title="Localizeaza-ma">+</button>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin></script>

    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script src="../js/i18n.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/map.js"></script>
</body>
</html>
