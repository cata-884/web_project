<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalii Camping - CaT</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <link rel="stylesheet" href="../css/map.css">
    <style>
        .camping-detail-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-section) 20px;
        }
        
        .gallery-container {
            margin-bottom: 40px;
        }

        .main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 16px;
            background: #f0f0f0;
        }

        .thumbnail-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .thumbnail-list img {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .thumbnail-list img:hover, .thumbnail-list img.active {
            opacity: 1;
        }

        .content-split {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .content-split {
                grid-template-columns: 1fr;
            }
        }

        .camping-info h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .rating-location {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #666;
            margin-bottom: 24px;
        }

        .rating-badge {
            background: var(--color-accent);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .camping-description {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            white-space: pre-line;
        }


        /* Booking Card */
        .booking-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            position: sticky;
            top: 24px;
        }

        .booking-card h3 {
            margin-bottom: 16px;
            font-size: 1.5rem;
            color: var(--color-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: var(--font-family-main);
        }

        .price-calculation {
            margin: 24px 0;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .calc-total {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--color-teal);
            border-top: 1px solid #eee;
            padding-top: 8px;
            margin-top: 8px;
        }

        /* Reviews Section */
        .reviews-section {
            margin-top: 60px;
            border-top: 1px solid #ddd;
            padding-top: 40px;
        }

        .review-item {
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .review-author {
            font-weight: 600;
        }

        .review-rating {
            color: var(--color-accent);
        }

        .review-form-container {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
            display: none; /* Shown by JS */
        }

        .review-form-container h3 {
            margin-bottom: 16px;
        }

        .review-form-container textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 16px;
            font-family: var(--font-family-main);
        }

        .star-select span {
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
        }
        .star-select span.selected {
            color: var(--color-accent);
        }
    </style>
</head>
<body>
    <header class="top-header">
        <nav class="main-nav">
            <div class="nav-group">
                <a href="../index.html">Acasa</a>
                <a href="campings.html">Exploreaza</a>
                <a href="map.html">Harta</a>
            </div>
            <div class="logo">CaT</div>
            <div class="nav-group">
                <a href="auth.html">Autentificare</a>
                <a href="account/account.html">Contul Meu</a>
            </div>
        </nav>
    </header>

    <main class="camping-detail-layout" id="detail-main">
        <div id="loading-indicator">Incarcare date...</div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="../js/api.js"></script>
    <script src="../js/camping-detail.js"></script>
</body>
</html>
