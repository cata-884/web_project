<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creeaza cont - CaT</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body data-page-title="register.title">

    <main class="auth-layout">

        <div class="auth-visual">
            <img src="../assets/Mobile%20login-pana%20%281%29.svg" alt="Sign Up Illustration" class="illustration">
        </div>

        <div class="auth-form-container">
            <div class="auth-card">
                <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
                    <span class="lang-toggle-container"></span>
                </div>
                <h1 data-i18n="register.heading">Creeaza cont</h1>
                <p class="subtitle" data-i18n="register.subtitle">Un singur cont pentru a explora si rezerva campinguri din Romania.</p>

                <form id="register-form" class="login-form" novalidate>

                    <div class="form-group">
                        <label for="username" data-i18n="register.username_label">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" data-i18n-ph="register.username_ph" placeholder="e.g., ion_popescu" required minlength="3">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="fullname"><span data-i18n="register.fullname_label">Nume complet</span> <span style="font-weight:400; color:#999;" data-i18n="register.fullname_optional">(optional)</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="fullname" name="fullname" data-i18n-ph="register.fullname_ph" placeholder="e.g., Ion Popescu">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email" data-i18n="register.email_label">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" data-i18n-ph="register.email_ph" placeholder="e.g., ion@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password"><span data-i18n="register.pass_label">Parola</span> <span style="font-weight:400; color:#999;" data-i18n="register.pass_hint">(min. 8 caractere)</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" data-i18n-ph="register.pass_ph" placeholder="Creeaza o parola" required minlength="8">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password" data-i18n="register.confirm_label">Confirma parola</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm-password" name="confirm-password" data-i18n-ph="register.confirm_ph" placeholder="Repeta parola" required>
                        </div>
                    </div>

                    <div class="terms-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms"><span data-i18n="register.terms_text">Sunt de acord cu</span> <a href="#" data-i18n="register.terms_link">Termenii si Conditiile</a></label>
                    </div>

                    <div id="register-error" style="display:none; color:#EF6A00; font-size:14px; margin-bottom:10px; padding:8px 12px; background:rgba(239,106,0,.08); border-radius:6px;"></div>

                    <button type="submit" class="btn-submit" id="register-btn" data-i18n="register.btn">Creeaza cont</button>
                </form>

                <div class="divider">
                    <span data-i18n="register.divider">Sau</span>
                </div>

                <div class="social-login">
                    <button class="btn-social" type="button">
                        <span>G</span> Google
                    </button>
                    <button class="btn-social" type="button">
                        <span>A</span> Apple
                    </button>
                </div>

                <p class="signup-link"><span data-i18n="register.have_account">Ai deja cont?</span> <a href="auth.html" data-i18n="auth.btn">Sign In</a></p>
            </div>
        </div>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/api.js"></script>
    <script>
        (function () {
            if (localStorage.getItem('cat_token')) {
                window.location.href = 'account/account.html';
            }

            document.getElementById('register-form').addEventListener('submit', async function (e) {
                e.preventDefault();
                const btn = document.getElementById('register-btn');
                const errEl = document.getElementById('register-error');

                const username = document.getElementById('username').value.trim();
                const fullname = document.getElementById('fullname').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const termsChecked = document.getElementById('terms').checked;

                errEl.style.display = 'none';

                if (username.length < 3) {
                    errEl.textContent = t('register.error_username');
                    errEl.style.display = 'block';
                    return;
                }
                if (password.length < 8) {
                    errEl.textContent = t('register.error_pass_short');
                    errEl.style.display = 'block';
                    return;
                }
                if (password !== confirmPassword) {
                    errEl.textContent = t('register.error_pass_match');
                    errEl.style.display = 'block';
                    return;
                }
                if (!termsChecked) {
                    errEl.textContent = t('register.error_terms');
                    errEl.style.display = 'block';
                    return;
                }

                btn.disabled = true;
                btn.textContent = t('register.loading');

                try {
                    const body = { username, email, password };
                    if (fullname) body.full_name = fullname;

                    const data = await api.post('/api/auth/register', body);
                    localStorage.setItem('cat_token', data.token);
                    localStorage.setItem('cat_user', JSON.stringify(data.user));
                    window.location.href = 'account/account.html';
                } catch (err) {
                    errEl.textContent = err.message || t('register.error_default');
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = t('register.btn');
                }
            });
        })();
    </script>
</body>
</html>
