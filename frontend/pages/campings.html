<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploreaza Campinguri - CaT</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/campings.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>
<body data-page-title="campings.title">
    <header class="top-header">
        <nav class="main-nav">
            <div class="nav-group">
                <a href="../index.html" data-i18n="nav.home">Acasa</a>
                <a href="./campings.html" data-i18n="nav.explore">Exploreaza</a>
                <a href="./map.html" data-i18n="nav.map">Harta</a>
            </div>
            <div class="logo">CaT</div>
            <div class="nav-group">
                <a href="./auth.html" data-i18n="nav.login">Autentificare</a>
                <a href="./account/account.html" data-i18n="nav.account">Contul Meu</a>
                <span class="lang-toggle-container"></span>
            </div>
            <button type="button" class="hamburger-menu" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </nav>
    </header>

    <main class="campings-layout">
        <aside class="filters-sidebar">
            <form id="filters-form">
                <div class="filter-group">
                    <h4 data-i18n="campings.search_label">Cautare</h4>
                    <label for="filter-search"></label><input type="text" id="filter-search" data-i18n-ph="campings.search_ph" placeholder="Cauta dupa nume...">
                </div>

                <div class="filter-group">
                    <h4 data-i18n="campings.region_label">Regiune</h4>
                    <label for="filter-region"></label><select id="filter-region">
                        <option value="" data-i18n="campings.region_all">Toate</option>
                        <option value="Transilvania">Transilvania</option>
                        <option value="Moldova">Moldova</option>
                        <option value="Dobrogea">Dobrogea</option>
                        <option value="Muntenia">Muntenia</option>
                        <option value="Banat">Banat</option>
                        <option value="Crisana">Crisana</option>
                        <option value="Maramures">Maramures</option>
                        <option value="Bucovina">Bucovina</option>
                    </select>
                </div>

                <div class="filter-group">
                    <h4 data-i18n="campings.type_label">Tip Camping</h4>
                    <!-- html-validate-disable form-dup-name -->
                    <label><input type="checkbox" name="type" value="tent"> <span data-i18n="map.type_tent">Cort</span></label>
                    <label><input type="checkbox" name="type" value="rv"> <span data-i18n="map.type_rv">Autorulota</span></label>
                    <label><input type="checkbox" name="type" value="cabin"> <span data-i18n="map.type_cabin">Casuta</span></label>
                    <label><input type="checkbox" name="type" value="glamping"> <span data-i18n="map.type_glamping">Glamping</span></label>
                    <label><input type="checkbox" name="type" value="wild"> <span data-i18n="map.type_wild">Salbatic</span></label>
                    <!-- html-validate-enable form-dup-name -->
                </div>

                <div class="filter-group">
                    <h4 data-i18n="campings.price_label">Pret / noapte</h4>
                    <div class="price-inputs">
                        <label for="filter-min-price"></label><input type="number" id="filter-min-price" placeholder="Min" min="0">
                        <span>-</span>
                        <label for="filter-max-price"></label><input type="number" id="filter-max-price" placeholder="Max" min="0">
                    </div>
                </div>

                <div class="filter-group">
                    <h4 data-i18n="campings.rating_label">Rating Minim</h4>
                    <label for="filter-min-rating"></label><select id="filter-min-rating">
                        <option value="" data-i18n="campings.rating_any">Oricare</option>
                        <option value="4">4+ <span data-i18n="campings.stars">Stele</span></option>
                        <option value="3">3+ <span data-i18n="campings.stars">Stele</span></option>
                        <option value="2">2+ <span data-i18n="campings.stars">Stele</span></option>
                    </select>
                </div>

                <!-- html-validate-disable-next-line no-inline-style -->
                <button type="submit" class="btn-dark" style="width: 100%;" data-i18n="campings.apply">Aplica Filtre</button>
                <!-- html-validate-disable-next-line no-inline-style -->
                <button type="button" id="btn-recommend" class="btn-recommend" data-i18n="campings.recommend" style="display:none; width:100%; margin-top:8px;">Recomanda pentru mine</button>
            </form>
        </aside>

        <section class="campings-main">
            <div class="search-header">
                <h1><span data-i18n="campings.results">Rezultate</span> (<span id="results-count">0</span>)</h1>
            </div>

            <div class="campings-grid" id="campings-grid">
                <div class="camping-card skeleton">
                    <div class="card-image skeleton"></div>
                    <div class="card-content">
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text"></div>
                        <!-- html-validate-disable-next-line no-inline-style -->
                        <div class="skeleton-text" style="width: 50%;"></div>
                    </div>
                </div>
            </div>

            <div class="pagination">
                <button type="button" id="btn-prev" disabled data-i18n="campings.prev">Inapoi</button>
                <span id="page-info">Pagina 1</span>
                <button type="button" id="btn-next" disabled data-i18n="campings.next">Inainte</button>
            </div>
        </section>
    </main>

    <template id="tpl-camping-skeleton">
<!-- html-validate-disable no-inline-style, empty-heading, element-required-attributes, form-dup-name, attribute-misuse -->
        <div class="camping-card skeleton">
            <div class="card-image skeleton"></div>
            <div class="card-content">
                <div class="skeleton-text"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text" style="width:50%;"></div>
            </div>
        </div>
<!-- html-validate-enable no-inline-style, empty-heading, element-required-attributes, form-dup-name, attribute-misuse -->
    </template>

    <template id="tpl-camping-card">
<!-- html-validate-disable no-inline-style, empty-heading, element-required-attributes, form-dup-name, attribute-misuse -->
        <div class="camping-card">
            <img class="card-image" alt="">
            <div class="card-content">
                <span class="card-type"></span>
                <h2 class="card-title"></h2>
                <p class="card-region"></p>
                <div class="card-bottom">
                    <div class="card-price"></div>
                    <div class="card-rating"></div>
                </div>
            </div>
            <a class="btn-details"></a>
        </div>
<!-- html-validate-enable no-inline-style, empty-heading, element-required-attributes, form-dup-name, attribute-misuse -->
    </template>

    <script src="../js/i18n.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/templates.js"></script>
    <script src="../js/campings.js"></script>
</body>
</html>
