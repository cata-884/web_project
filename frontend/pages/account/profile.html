<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - CaT (Camping Info)</title>

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/account.css">
</head>
<body>

    <div class="account-layout">

        <aside class="account-sidebar">

            <div class="theme-toggle">
                <button class="toggle-btn active" type="button">Dark ☾</button>
                <button class="toggle-btn" type="button">White ☼</button>
            </div>

            <nav class="sidebar-nav">
                <a href="../../index.html" class="nav-item">
                    <span>Home</span>
                    <span class="arrow">↗</span>
                </a>
                <a href="#" class="nav-item">
                    <span>History</span>
                    <span class="arrow">↗</span>
                </a>
                <a href="#" class="nav-item">
                    <span>Settings</span>
                    <span class="arrow">↗</span>
                </a>
                <a href="profile.html" class="nav-item active">
                    <span>Profile</span>
                    <span class="arrow">↗</span>
                </a>
            </nav>

            <button class="btn-logout" type="button" onclick="window.location.href='../auth.html'">Log Out</button>
        </aside>

       <main class="account-content">
    <div class="profile-widget">

        <div class="profile-avatar"></div>

        <div class="profile-form-box">

            <div class="form-row split">
                <div class="input-group">
                    <label>Last name</label>
                    <input type="text" placeholder="Mihai">
                </div>
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Gigel">
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>About Me</label>
                    <textarea placeholder="Hello! I'm a software developer by day, but I know how frustrating a slow laptop or a disconnected Wi-Fi router can be..."></textarea>
                </div>
            </div>

        </div>

    </div>
</main>

    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
