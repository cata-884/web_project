<VirtualHost *:80>
    DocumentRoot /var/www/frontend

    # SPA: fallback la index.html (echivalent try_files ... /index.html)
    <Directory /var/www/frontend>
        Require all granted
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    # API PHP sub /cat/public (în loc de proxy_pass)
    Alias /cat/public /var/www/html/public
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>