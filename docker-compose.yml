services:
  db:
    image: postgres:16
    container_name: camping_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: web_project_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/data/postgresql

  backend:
    build: ./backend
    container_name: camping_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: web_project_db
      DB_USER: postgres
      DB_PASS: password
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: camping_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata: