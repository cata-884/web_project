services:
  db:
    image: postgres:16
    container_name: camping_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data      # vezi nota de jos
  backend:
    build: ./backend
    container_name: camping_backend
    restart: always
    ports:
      - "80:80"                              # mutat de pe nginx
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/frontend         # frontendul, fost la nginx
    depends_on:
      - db
volumes:
  pgdata: